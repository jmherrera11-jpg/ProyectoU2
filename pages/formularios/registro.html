<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Daat Devotional</title>
    <link rel="icon" href="../../imagenes/registro.ico" type="image/x-icon">
    <link rel="stylesheet" href="../../css/general.css">
    <link rel="stylesheet" href="../../css/registro.css">
</head>
<body id="registro-page">
    <main>
        <section id="formulario-registro">
            <div class="tarjeta-registro">
                <img src="../../imagenes/LogoPrincipal.png" alt="Logo Principal">
                <h2>Daat Devotional</h2>
                <p>Crea tu cuenta</p>
                <form method="POST" action="login.html">
                    <label for="Nombres">Nombre Completo</label>
                    <input type="text" id="Nombres" name="Nombres" placeholder="Ingresa tu nombre y apellido" maxlength="50" minlength="10" required>
                    
                    <label for="Correo">Correo Electrónico</label>
                    <input type="email" id="Correo" name="Correo" placeholder="tu@email.com" maxlength="320" minlength="10" required>
                    
                    <label for="Contrasena">Contraseña</label>
                    <input type="password" id="Contrasena" name="Contrasena" placeholder="Ingrese su contraseña" maxlength="8" minlength="8" required>
                    
                    <label for="Confirmar">Confirmar Contraseña</label>
                    <input type="password" id="Confirmar" name="Confirmar" placeholder="Confirme su contraseña" maxlength="8" minlength="8" required>
                    
                    <button type="submit">Registrarse</button>
                </form>
                <div class="enlaces-formulario">
                    <p>¿Ya tienes cuenta? <a href="login.html"><b>Inicia Sesión</b></a></p>
                    <p><a href="../../index.html">← Volver al inicio</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Daat Devotional - Todos los derechos reservados</p>
    </footer>
</body>
</html>
